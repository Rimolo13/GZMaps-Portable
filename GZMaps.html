<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GZMaps - Gesamte Karte</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2048%2048'%3E%3Cpath%20fill='%23035d3b'%20d='m35.76%2026.36h.01s-3.77%205.53-6.94%209.64c-2.74%203.55-3.54%206.59-3.77%208.06-.09.54-.53.94-1.06.94s-.97-.4-1.06-.94c-.23-1.47-1.03-4.51-3.77-8.06-.42-.55-.85-1.12-1.28-1.7L28.24%2022l8.33-9.88A14.4%2014.4%200%200%201%2038%2018.5c0%202.9-.83%205.59-2.24%207.86z'/%3E%3Cpath%20fill='%23daff08'%20d='M13.27%209.2A14.42%2014.42%200%200%200%2010%2018.5c0%202.29.52%204.45%201.44%206.38.23.51.5%201%20.8%201.48h-.01s2.84%204.16%205.66%207.94L28.15%2022.11A5.48%205.48%200%200%201%2024%2024a5.5%205.5%200%200%201-5.5-5.5c0-1.33.47-2.55%201.26-3.5l.07-.08z'/%3E%3Cpath%20fill='%23089bff'%20d='M24%204c-4.31%200-8.17%202.02-10.73%205.2l6.56%205.72.02-.03.05-.06.01-.01A5.46%205.46%200%200%201%2024%2013a5.5%205.5%200%200%201%205.5%205.5c0%201.33-.47%202.55-1.26%203.5l8.33-9.88A14.47%2014.47%200%200%200%2028.4%204.74%2014.56%2014.56%200%200%200%2024%204z'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        --text-color: rgb(255, 255, 250);
        --background-color: rgb(255, 255, 250);
        --background-second-color: rgb(215, 239, 211);
        --text-highlight: rgb(250, 170, 0);
        --text-bar-color: rgb(3, 3, 0);
        --bar-background-color: rgb(210, 225, 200);
        --button-color: rgb(6, 110, 90);
        --button-color-hover: rgb(6, 150, 130);
        --houses-color: rgb(3, 130, 110);
        --houses-color-hover: rgb(3, 90, 70);
        --corridors-color: rgb(55, 95, 75);
        --basements-color: rgb(3, 105, 85);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background-color: rgb(0, 0, 0);
          --background-second-color: rgb(35, 39, 31);
          --text-highlight: rgb(230, 150, 0);
          --text-bar-color: rgb(255, 255, 250);
          --bar-background-color: rgb(37, 37, 33);
          --button-color: rgb(6, 70, 50);
          --button-color-hover: rgb(6, 30, 10);
          --houses-color: rgb(3, 90, 70);
          --houses-color-hover: rgb(3, 50, 30);
          --corridors-color: rgb(30, 70, 50);
          --basements-color: rgb(3, 75, 55);
        }
      }

      * {
        margin: 0px;
        padding: 0px;
        list-style: none;
        font-family:
          "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
          "Lucida Sans Unicode", Geneva, Verdana, sans-serif, Times, serif;
        color: var(--text-color);
        font-size: 1.05em;
        font-weight: bolder;
        text-align: center;
        transition: all 0.5s;
        overflow: hidden;
        user-select: none;
      }

      html,
      body,
      #app,
      #settings {
        height: 100dvh;
        width: 100dvw;
      }

      .not-displayed {
        display: none !important;
      }

      .hidden {
        opacity: 0;
        pointer-events: none;
      }

      .heading {
        font-size: 1.5em;
      }

      .subheading {
        font-size: 1.3em;
        text-decoration: underline;
        color: var(--text-bar-color);
      }

      .bar {
        display: flex;
        background: var(--bar-background-color);
        flex-direction: row;
        justify-content: center;
        align-items: center;
      }

      .bar-text {
        color: var(--text-bar-color);
      }

      .button {
        background: var(--button-color);
        border-radius: 7px;
        padding: 5%;
        margin: 5%;
        max-width: max-content;
        cursor: pointer;
      }

      .button:hover {
        background: var(--button-color-hover);
      }

      .input {
        outline: none;
        border: solid var(--houses-color-hover) 1px;
        background: var(--houses-color);
      }

      .select {
        background: var(--houses-color-hover);
        border-radius: 5px;
        cursor: pointer;
      }

      .select:hover,
      .select-activ {
        background: var(--houses-color);
        color: var(--text-highlight) !important;
      }

      #settings {
        display: grid;
        position: absolute;
        background: radial-gradient(
          var(--background-second-color),
          var(--background-color) 100%
        );
        justify-items: center;
        align-items: center;
        grid-template-columns: 1fr;
        grid-template-rows: 0.7fr 0.7fr 0.3fr 0.7fr;
      }

      #settings div {
        display: grid;
        background: var(--bar-background-color);
        border-radius: 5px;
        padding: 1.3%;
        width: 60%;
      }

      #settings div * {
        max-width: 97.4%;
        padding: 1.3%;
      }

      .settings-margin-down {
        margin-bottom: 1.3%;
      }

      .settings-input {
        border-radius: 5px;
        border: none;
      }

      .settings-buttons {
        color: var(--text-color) !important;
        margin: 0% !important;
      }

      .settings-felds {
        grid-area: 2 / 1 / 3 / 2;
      }

      .settings-button-feld {
        grid-area: 3 / 1 / 4 / 2;
      }

      #app {
        display: grid;
        background: var(--background-color);
        grid-template-rows: 10% 80% 10%;
      }

      #edit-button {
        margin: 0% 5% 5% 5%;
      }

      main {
        display: grid;
        grid-template-columns: 15% 70% 15%;
        background: radial-gradient(
          var(--background-second-color),
          var(--background-color) 100%
        );
      }

      #edit-bar {
        display: flex;
        justify-content: start;
        align-items: start;
        flex-direction: column;
      }

      #save-bar {
        display: flex;
        justify-content: end;
        align-items: end;
        flex-direction: column;
      }

      #maps {
        display: grid;
      }

      #full-map {
        display: grid;
        justify-self: center;
        align-self: center;
        aspect-ratio: 1/1;
        max-width: 100dvw;
        grid-template-columns: repeat(32, 1fr);
        grid-template-rows: repeat(32, 1fr);
      }

      .full-map-scale-hight {
        height: 100%;
        width: auto;
      }

      .full-map-scale-width {
        height: auto;
        width: 100%;
      }

      .houses {
        display: grid;
        background: var(--houses-color);
        height: 100%;
        width: 100%;
        justify-content: center;
        align-items: center;
        border-radius: 3px;
        cursor: pointer;
      }

      .houses:hover {
        background: var(--houses-color-hover);
      }

      .corridors {
        display: grid;
        background: var(--corridors-color);
        height: 100%;
        width: 100%;
      }

      #house-1 {
        grid-area: 13 / 22 / 28 / 25;
      }

      #house-2 {
        grid-area: 15 / 9 / 27 / 12;
      }

      #house-3 {
        grid-area: 9 / 8 / 12 / 25;
      }

      #house-4 {
        grid-area: 2 / 14 / 7 / 19;
      }

      #house-5 {
        grid-area: 2 / 26 / 5 / 29;
      }

      #house-6 {
        grid-area: 7 / 26 / 12 / 29;
      }

      #house-8 {
        grid-area: 23 / 27 / 30 / 29;
      }

      #house-11 {
        grid-area: 30 / 14 / 32 / 16;
      }

      .corridor-1 {
        grid-area: 12 / 23 / 13/ 24;
      }

      .corridor-2 {
        grid-area: 7 / 16 / 9 / 17;
      }

      .corridor-3 {
        grid-area: 12 / 10 / 15 / 11;
      }

      .houses-map {
        display: grid;
        justify-self: center;
        align-self: center;
        height: 90%;
        width: 90%;
        background: var(--houses-color);
        border-radius: 9px;
      }

      .houses-map p {
        display: flex;
        height: 100%;
        width: 100%;
        justify-content: center;
        align-items: center;
        border: solid var(--houses-color-hover) 1px;
      }

      .houses-map input {
        display: flex;
        height: 100%;
        width: 100%;
        justify-content: center;
        align-items: center;
      }

      .basements {
        background: var(--basements-color) !important;
      }

      .house-1-map {
        grid-template-rows: repeat(5, 1fr);
        grid-template-columns: repeat(2, 1fr);
      }

      .house-2-map {
        grid-template-rows: repeat(5, 1fr);
        grid-template-columns: repeat(2, 1fr);
      }

      .house-3-map {
        grid-template-rows: repeat(6, 1fr);
        grid-template-columns: 40% 20% 40%;
      }

      .house-4-map {
        grid-template-rows: repeat(5, 1fr);
        grid-template-columns: 100%;
      }

      .house-5-map {
        grid-template-rows: repeat(4, 1fr);
        grid-template-columns: 100%;
      }

      .house-6-map {
        grid-template-rows: repeat(3, 1fr);
        grid-template-columns: 100%;
      }

      .house-8-map {
        grid-template-rows: repeat(3, 1fr);
        grid-template-columns: repeat(2, 1fr);
      }

      .house-11-map {
        grid-template-rows: 100%;
        grid-template-columns: repeat(2, 1fr);
      }

      @media (orientation: portrait) {
        main {
          display: grid;
          grid-template-columns: unset;
          grid-template-rows: 10% 80% 10%;
        }

        .heading {
          font-size: 1.4em;
        }

        .bar {
          flex-direction: column;
        }

        .button {
          padding: 1.3%;
          margin: 1.3%;
        }

        #settings div {
          width: 80%;
        }

        #edit-button {
          margin: 1.3% 1.3% 1.3% 0%;
        }

        #edit-bar,
        #save-bar {
          flex-direction: row;
        }
      }
    </style>
    <!-- ################################################################ -->
    <!-- Settings -->
    <!-- ################################################################ -->
    <script type="module"></script>
    <!-- ################################################################ -->
    <!-- App -->
    <!-- ################################################################ -->
    <script type="module">
      //================================================================
      //var
      //================================================================
      const title_maps = [
        "Gesamte Karte",
        "Haus 1",
        "Haus 2",
        "Haus 3",
        "Haus 4",
        "Haus 5",
        "Haus 6",
        "Haus 8",
        "Haus 11",
      ];
      const template_list = [
        "full-map",
        "house-1",
        "house-2",
        "house-3",
        "house-4",
        "house-5",
        "house-6",
        "house-8",
        "house-11",
      ];
      let routes = [];
      let houses_ids = [];
      let houses_maps_ids = [];

      const houses_inputs = [10, 10, 18, 5, 4, 3, 6, 2];
      const basements = [2, 2, 3, 1, 1, 1, 2, 0];

      const maps = document.getElementById("maps");
      const full_map = document.getElementById("full-map");
      const edit_bar = document.getElementById("edit-bar");
      const edit_button = document.getElementById("edit-button");
      const save_button = document.getElementById("save-button");
      const copyright = document.getElementById("copyright");

      let input_list = [];
      let value_list = [];
      let edit_mode = 0;

      const height_70p = (window.innerHeight / 100) * 70;

      const date_now = new Date();

      //================================================================
      //var maker
      //================================================================
      for (let i = 0; i < template_list.length; i++) {
        routes.push(`#${template_list[i]}`);
        if (i === 0) {
          houses_ids.push(`${template_list[i]}-back`);
          houses_maps_ids.push(template_list[i]);
        } else {
          houses_ids.push(template_list[i]);
          houses_maps_ids.push(`${template_list[i]}-map`);
        }
      }

      //================================================================
      //build
      //================================================================
      function element_builder({
        element,
        id,
        classes,
        textcontent,
        type,
        placeholder,
        readonly,
      }) {
        const createdelement = document.createElement(element);
        if (id) createdelement.id = id;
        if (classes) createdelement.className = classes;
        if (textcontent) createdelement.textContent = textcontent;
        if (type) createdelement.type = type;
        if (placeholder) createdelement.placeholder = placeholder;
        if (readonly) createdelement.readOnly = readonly;
        return createdelement;
      }

      for (let i = 1; i < houses_maps_ids.length; i++) {
        //houses
        const full_map_house = element_builder({
          element: "div",
          classes: "houses",
          id: `${houses_ids[i]}`,
        });
        const full_map_house_number = element_builder({
          element: "p",
          textcontent: `${houses_ids[i].split("-")[1]}`,
        });
        full_map_house.appendChild(full_map_house_number);
        full_map.appendChild(full_map_house);
        //corridors
        if (i < 4) {
          const full_map_corridor = element_builder({
            classes: `corridor-${i} corridors`,
          });
          full_map.appendChild(full_map_corridor);
        }
        //maps
        const map = element_builder({
          element: "div",
          classes: `house-${i}-map houses-map not-displayed`,
          id: `${houses_maps_ids[i]}`,
        });
        maps.appendChild(map);
        //map input felds
        for (let x = 1; x <= houses_inputs[i - 1]; x++) {
          const input = element_builder({
            element: "input",
            id: `h${i}-${x}`,
            classes: "input",
            type: "Text",
            placeholder: `${x}`,
            readonly: true,
          });
          if (houses_inputs[i - 1] - basements[i - 1] < x) {
            input.classList.add("basements");
          }
          input_list.push(input);
          map.appendChild(input);
        }
      }

      //================================================================
      //scale
      //================================================================
      window.addEventListener("resize", () => {
        setTimeout(correct_resize, 300);
      });

      correct_resize();
      function correct_resize() {
        if (window.innerWidth < height_70p) {
          full_map.classList.add("full-map-scale-width");
          full_map.classList.remove("full-map-scale-hight");
        } else {
          full_map.classList.add("full-map-scale-hight");
          full_map.classList.remove("full-map-scale-width");
        }
      }

      //================================================================
      //switch
      //================================================================
      [("load", "popstate")].forEach((e) => window.addEventListener(e, repage));

      function repage() {
        for (let i = 0; i < routes.length; i++) {
          if (routes[i] === window.location.hash) {
            switchmap(i);
            return;
          }
        }
        let path = routes[0];
        history.pushState({}, "", path);
        switchmap(0);
      }

      for (let i = 0; i < routes.length; i++) {
        const houses = document.getElementById(houses_ids[i]);
        const path = routes[i];
        houses.addEventListener("click", () => {
          history.pushState({}, "", path);
          switchmap(i);
        });
      }

      async function switchmap(map) {
        load_values();
        for (let i = 0; i < houses_maps_ids.length; i++) {
          if (i === map) {
            document.title = `GZMaps - ${title_maps[i]}`;
            document.getElementById("header").textContent =
              `GZMaps - ${title_maps[i]}`;
            const activ_map = document.getElementById(houses_maps_ids[i]);
            activ_map.classList.add("hidden");
            activ_map.classList.remove("not-displayed");
            setTimeout(() => {
              activ_map.classList.remove("hidden");
            }, 30);
            if (map === 0) {
              edit_bar.classList.add("hidden");
              if (edit_mode === 1) {
                edit_switch();
              }
            } else {
              edit_bar.classList.remove("hidden");
            }
          } else {
            const inactiv_map = document.getElementById(houses_maps_ids[i]);
            inactiv_map.classList.add("not-displayed");
          }
        }
      }

      //================================================================
      //input
      //================================================================
      edit_button.addEventListener("click", edit_switch);
      save_button.addEventListener("click", save);

      async function save() {
        value_list = [];
        input_list.forEach((e) => {
          value_list.push(e.value);
        });
        await fetch("/t/POSTMapData", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            values: value_list,
          }),
        });
        edit_switch();
      }

      async function edit_switch() {
        if (edit_mode == 0) {
          const getpassword = prompt("Password:");
          const code_words = [
            "LemmyIsGod",
            "PrinceOfFuckingDarkness",
            "ComeTouchMyMetalMachine",
            "MetalGods",
          ];
          const nice_links = [
            "https://youtu.be/fM1UPeAOyHM?si=B5QVM3Gl32ScGb6w",
            "https://youtu.be/S6A13bOB76A?si=bw6tJRjNZ_Gt4rA7",
            "https://youtube.com/shorts/mTQffwXF1k8?si=QN8msGXkStp0srmz",
            "https://youtu.be/CLWlCQZy87g?si=nNuZagMzejflPyff",
          ];
          for (let i = 0; i < code_words.length; i++) {
            if (getpassword === code_words[i]) {
              console.log(code_words[i], nice_links[i]);
              window.open(nice_links[i], "_blank");
              return;
            }
          }
          if (getpassword != "" && getpassword != null) {
            const password_valid = await fetch("/t/POSTPassword", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                PasswordInput: getpassword,
              }),
            });
            if ((await password_valid.json()).isValid === true) {
              input_list.forEach((e) => {
                e.readOnly = false;
              });
              save_button.classList.remove("hidden");
              edit_button.textContent = "abbrechen";
              edit_mode = 1;
            }
          }
        } else {
          input_list.forEach((e) => {
            e.readOnly = true;
          });
          save_button.classList.add("hidden");
          edit_button.textContent = "bearbeiten";
          edit_mode = 0;
          load();
        }
      }

      load_values();
      async function load_values() {
        try {
          value_list = (await (await fetch("/t/GETMapData")).json()).values;
          load();
        } catch (err) {}
      }

      function load() {
        for (let i = 0; i < input_list.length; i++) {
          if (value_list[i] != undefined) {
            input_list[i].value = value_list[i];
          }
        }
      }

      //================================================================
      //copyright
      //================================================================
      copyright.textContent = `©${date_now.getUTCFullYear()}\u00A0`;
    </script>
  </head>
  <body>
    <div id="settings">
      <div class="settings-felds" id="settings-mode">
        <p class="subheading">Betriebsmodus wählen:</p>
        <p class="select settings-margin-down" id="setting-server">Server</p>
        <p class="select" id="setting-local">Lokal</p>
      </div>
      <div class="settings-felds not-displayed" id="settings-server">
        <p class="subheading">Server Link:</p>
        <input
          type="text"
          class="input settings-input settings-margin-down"
          id="settings-input"
        />
        <p class="button settings-buttons" id="settings-server-test">
          Verbindungs Test
        </p>
      </div>
      <div class="settings-felds not-displayed" id="settings-user">
        <p class="subheading">Rolle wählen:</p>
        <p class="select settings-margin-down" id="setting-admin">Admin</p>
        <p class="select" id="setting-user">Benutzer</p>
      </div>
      <div class="settings-button-feld">
        <p class="button settings-buttons" id="settings-button">weiter</p>
      </div>
    </div>
    <div id="app">
      <header class="bar">
        <p class="bar-text heading" id="header">GZMaps - Gesamte Karte</p>
      </header>
      <main>
        <div class="hidden" id="edit-bar">
          <p class="button" id="full-map-back">Zurück</p>
          <p class="button" id="edit-button">Bearbeiten</p>
        </div>
        <div id="maps">
          <div id="full-map"></div>
        </div>
        <div id="save-bar">
          <p class="button hidden" id="save-button">Speichern</p>
        </div>
      </main>
      <footer class="bar">
        <p class="bar-text" id="copyright"></p>
        <p class="bar-text">Rimolo13 and Mocbuilder</p>
      </footer>
    </div>
  </body>
</html>
