<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GZMaps - Gesamte Karte</title>
    <link

    <style>
      :root {
        --background-color: rgb(255, 255, 250);
        --background-second-color: rgb(215, 239, 211);
        --bar-background-color: rgb(235, 235, 221);
        --button-color: rgb(6, 110, 90);
        --button-color-hover: rgb(6, 150, 130);
        --text-color: rgb(255, 255, 250);
        --text-bar-color: rgb(3, 3, 0);
        --houses-color: rgb(3, 90, 70);
        --houses-color-hover: rgb(3, 130, 110);
        --corridors-color: rgb(30, 70, 50);
        --basements-color: rgb(3, 75, 55);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background-color: rgb(0, 0, 0);
          --background-second-color: rgb(35, 39, 31);
          --bar-background-color: rgb(31, 31, 29);
          --button-color: rgb(6, 70, 50);
          --button-color-hover: rgb(6, 30, 10);
          --text-bar-color: rgb(255, 255, 250);
          --houses-color-hover: rgb(3, 50, 30);
        }
      }

      * {
        margin: 0px;
        padding: 0px;
        list-style: none;
        font-family:
          "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
          "Lucida Sans Unicode", Geneva, Verdana, sans-serif, Times, serif;
        color: var(--text-color);
        font-size: 1.05em;
        font-weight: bolder;
        text-align: center;
        transition: all 0.5s;
        overflow: hidden;
        user-select: none;
      }

      html,
      body {
        height: 100dvh;
        width: 100dvw;
      }

      body {
        display: grid;
        background: var(--background-color);
        grid-template-rows: 10% 80% 10%;
      }

      .hidden {
        opacity: 0;
        pointer-events: none;
      }

      .not-displayed {
        display: none !important;
      }

      .headline {
        font-size: 1.5em;
      }

      .bar {
        display: flex;
        background: var(--bar-background-color);
        flex-direction: row;
        justify-content: center;
        align-items: center;
      }

      .bar-text {
        color: var(--text-bar-color);
      }

      .button {
        background: var(--button-color);
        padding: 5%;
        border-radius: 7px;
        margin: 5%;
      }

      .button:hover {
        background: var(--button-color-hover);
      }

      #edit-button {
        margin: 0% 5% 5% 5%;
      }

      main {
        display: grid;
        grid-template-columns: 15% 70% 15%;
        background: radial-gradient(
          var(--background-second-color),
          var(--background-color) 100%
        );
      }

      #edit-bar {
        display: flex;
        justify-content: start;
        align-items: start;
        flex-direction: column;
      }

      #save-bar {
        display: flex;
        justify-content: end;
        align-items: end;
        flex-direction: column;
      }

      #full-map {
        display: grid;
        justify-self: center;
        align-self: center;
        aspect-ratio: 1/1;
        max-width: 100dvw;
        grid-template-columns: repeat(32, 1fr);
        grid-template-rows: repeat(32, 1fr);
        grid-template-areas:
          ". . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . ."
          ". . . . . . . . . . . . . d d d d d . . . . . . . e e e . . . ."
          ". . . . . . . . . . . . . d d d d d . . . . . . . e e e . . . ."
          ". . . . . . . . . . . . . d d d d d . . . . . . . e e e . . . ."
          ". . . . . . . . . . . . . d d d d d . . . . . . . . . . . . . ."
          ". . . . . . . . . . . . . d d d d d . . . . . . . . . . . . . ."
          ". . . . . . . . . . . . . . . y . . . . . . . . . f f f . . . ."
          ". . . . . . . . . . . . . . . y . . . . . . . . . f f f . . . ."
          ". . . . . . . c c c c c c c c c c c c c c c c c . f f f . . . ."
          ". . . . . . . c c c c c c c c c c c c c c c c c . f f f . . . ."
          ". . . . . . . c c c c c c c c c c c c c c c c c . f f f . . . ."
          ". . . . . . . . . x . . . . . . . . . . . . z . . . . . . . . ."
          ". . . . . . . . . x . . . . . . . . . . . a a a . . . . . . . ."
          ". . . . . . . . . x . . . . . . . . . . . a a a . . . . . . . ."
          ". . . . . . . . b b b . . . . . . . . . . a a a . . . . . . . ."
          ". . . . . . . . b b b . . . . . . . . . . a a a . . . . . . . ."
          ". . . . . . . . b b b . . . . . . . . . . a a a . . . . . . . ."
          ". . . . . . . . b b b . . . . . . . . . . a a a . . . . . . . ."
          ". . . . . . . . b b b . . . . . . . . . . a a a . . . . . . . ."
          ". . . . . . . . b b b . . . . . . . . . . a a a . . . . . . . ."
          ". . . . . . . . b b b . . . . . . . . . . a a a . . . . . . . ."
          ". . . . . . . . b b b . . . . . . . . . . a a a . . . . . . . ."
          ". . . . . . . . b b b . . . . . . . . . . a a a . . g g . . . ."
          ". . . . . . . . b b b . . . . . . . . . . a a a . . g g . . . ."
          ". . . . . . . . b b b . . . . . . . . . . a a a . . g g . . . ."
          ". . . . . . . . b b b . . . . . . . . . . a a a . . g g . . . ."
          ". . . . . . . . . . . . . . . . . . . . . a a a . . g g . . . ."
          ". . . . . . . . . . . . . . . . . . . . . . . . . . g g . . . ."
          ". . . . . . . . . . . . . . . . . . . . . . . . . . g g . . . ."
          ". . . . . . . . . . . . . h h . . . . . . . . . . . . . . . . ."
          ". . . . . . . . . . . . . h h . . . . . . . . . . . . . . . . ."
          ". . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .";
      }

      .full-map-scale-hight {
        height: 100%;
        width: auto;
      }

      .full-map-scale-width {
        height: auto;
        width: 100%;
      }

      .houses {
        display: grid;
        background: var(--houses-color);
        height: 100%;
        width: 100%;
        justify-content: center;
        align-items: center;
        border-radius: 3px;
      }

      .houses:hover {
        background: var(--houses-color-hover);
      }

      .corridors {
        display: grid;
        background: var(--corridors-color);
        height: 100%;
        width: 100%;
      }

      #house-1 {
        grid-area: a;
      }

      #house-2 {
        grid-area: b;
      }

      #house-3 {
        grid-area: c;
      }

      #house-4 {
        grid-area: d;
      }

      #house-5 {
        grid-area: e;
      }

      #house-6 {
        grid-area: f;
      }

      #house-8 {
        grid-area: g;
      }

      #house-11 {
        grid-area: h;
      }

      .corridor-1 {
        grid-area: z;
      }

      .corridor-2 {
        grid-area: y;
      }

      .corridor-3 {
        grid-area: x;
      }

      .houses-map {
        display: grid;
        justify-self: center;
        align-self: center;
        height: 90%;
        width: 90%;
        background: var(--houses-color);
        border-radius: 9px;
      }

      .houses-map p {
        display: flex;
        height: 100%;
        width: 100%;
        justify-content: center;
        align-items: center;
        border: solid var(--houses-color-hover) 1px;
      }

      .houses-map input {
        display: flex;
        height: 100%;
        width: 100%;
        justify-content: center;
        align-items: center;
        border: solid var(--houses-color-hover) 1px;
        background: var(--houses-color);
        outline: none;
      }

      .basements {
        background: var(--basements-color) !important;
      }

      .house-1-map {
        grid-template-rows: repeat(5, 1fr);
        grid-template-columns: repeat(2, 1fr);
      }

      .house-2-map {
        grid-template-rows: repeat(5, 1fr);
        grid-template-columns: repeat(2, 1fr);
      }

      .house-3-map {
        grid-template-rows: repeat(6, 1fr);
        grid-template-columns: 40% 20% 40%;
      }

      .house-4-map {
        grid-template-rows: repeat(5, 1fr);
        grid-template-columns: 100%;
      }

      .house-5-map {
        grid-template-rows: repeat(4, 1fr);
        grid-template-columns: 100%;
      }

      .house-6-map {
        grid-template-rows: repeat(3, 1fr);
        grid-template-columns: 100%;
      }

      .house-8-map {
        grid-template-rows: repeat(3, 1fr);
        grid-template-columns: repeat(2, 1fr);
      }

      .house-11-map {
        grid-template-rows: 100%;
        grid-template-columns: repeat(2, 1fr);
      }

      @media (orientation: portrait) {
        main {
          display: grid;
          grid-template-columns: unset;
          grid-template-rows: 10% 80% 10%;
        }

        .bar {
          flex-direction: column;
        }

        .button {
          padding: 1%;
          margin: 1%;
        }

        #edit-button {
          margin: 1% 1% 1% 0%;
        }

        #edit-bar,
        #save-bar {
          flex-direction: row;
        }
      }
    </style>
    <script></script>
    <script type="module">
      //switch
      const routes = [
        "#full-map",
        "#house-1",
        "#house-2",
        "#house-3",
        "#house-4",
        "#house-5",
        "#house-6",
        "#house-8",
        "#house-11",
      ];

      const houses_ids = [
        "back-to-full-map",
        "house-1",
        "house-2",
        "house-3",
        "house-4",
        "house-5",
        "house-6",
        "house-8",
        "house-11",
      ];

      const houses_maps_ids = [
        "full-map",
        "house-1-map",
        "house-2-map",
        "house-3-map",
        "house-4-map",
        "house-5-map",
        "house-6-map",
        "house-8-map",
        "house-11-map",
      ];

      const title_maps = [
        "Gesamte Karte",
        "Haus 1",
        "Haus 2",
        "Haus 3",
        "Haus 4",
        "Haus 5",
        "Haus 6",
        "Haus 8",
        "Haus 11",
      ];

      const edit_bar = document.getElementById("edit-bar");

      ["load", "popstate"].forEach((e) => window.addEventListener(e, repage));

      function repage() {
        for (let i = 0; i < routes.length; i++) {
          if (routes[i] === window.location.hash) {
            switchmap(i);
            return;
          }
        }
        let path = routes[0];
        history.pushState({}, "", path);
        switchmap(0);
      }

      for (let i = 0; i < routes.length; i++) {
        const houses = document.getElementById(houses_ids[i]);
        let path = routes[i];
        houses.addEventListener("click", () => {
          history.pushState({}, "", path);
          switchmap(i);
        });
      }

      async function switchmap(map) {
        load_values();
        for (let i = 0; i < houses_maps_ids.length; i++) {
          if (i === map) {
            document.title = `GZMaps - ${title_maps[i]}`;
            document.getElementById("header").textContent =
              `GZMaps - ${title_maps[i]}`;
            const activ_map = document.getElementById(houses_maps_ids[i]);
            activ_map.classList.add("hidden");
            activ_map.classList.remove("not-displayed");
            setTimeout(() => {
              activ_map.classList.remove("hidden");
            }, 30);
            if (map === 0) {
              edit_bar.classList.add("hidden");
              if (edit_mode === 1) {
                edit_switch();
              }
            } else {
              edit_bar.classList.remove("hidden");
            }
          } else {
            const inactiv_map = document.getElementById(houses_maps_ids[i]);
            inactiv_map.classList.add("not-displayed");
          }
        }
      }

      //input
      let edit_button = document.getElementById("edit-button");
      let save_button = document.getElementById("save-button");

      const houses_inputs = [10, 10, 18, 5, 4, 3, 6, 2];
      const basements = [2, 2, 3, 1, 1, 1, 2, 0];
      let input_list = [];
      let value_list = [];

      for (let i = 1; i < houses_maps_ids.length; i++) {
        let map = document.getElementById(houses_maps_ids[i]);
        for (let x = 1; x <= houses_inputs[i - 1]; x++) {
          let input = document.createElement("input");
          input.type = "Text";
          input.id = `h${i}-${x}`;
          input.placeholder = `${x}`;
          input.readOnly = true;
          if (houses_inputs[i - 1] - basements[i - 1] < x) {
            input.classList.add("basements");
          }
          input_list.push(input);
          map.appendChild(input);
        }
      }

      edit_button.addEventListener("click", edit_switch);

      save_button.addEventListener("click", save);

      async function save() {
        value_list = [];
        input_list.forEach((e) => {
          value_list.push(e.value);
        });
        await fetch("/t/POSTMapData", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            values: value_list,
          }),
        });
        edit_switch();
      }

      export let edit_mode = 0;
      async function edit_switch() {
        if (edit_mode == 0) {
          const getpassword = prompt("Password:");
          const code_words = [
            "LemmyIsGod",
            "PrinceOfFuckingDarkness",
            "ComeTouchMyMetalMachine",
            "MetalGods",
          ];
          const nice_links = [
            "https://youtu.be/fM1UPeAOyHM?si=B5QVM3Gl32ScGb6w",
            "https://youtu.be/S6A13bOB76A?si=bw6tJRjNZ_Gt4rA7",
            "https://youtube.com/shorts/mTQffwXF1k8?si=QN8msGXkStp0srmz",
            "https://youtu.be/CLWlCQZy87g?si=nNuZagMzejflPyff",
          ];
          for (let i = 0; i < code_words.length; i++) {
            if (getpassword === code_words[i]) {
              console.log(code_words[i], nice_links[i]);
              window.open(nice_links[i], "_blank");
              return;
            }
          }
          if (getpassword != "" && getpassword != null) {
            const password_valid = await fetch("/t/POSTPassword", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                PasswordInput: getpassword,
              }),
            });
            if ((await password_valid.json()).isValid === true) {
              input_list.forEach((e) => {
                e.readOnly = false;
              });
              save_button.classList.remove("hidden");
              edit_button.textContent = "abbrechen";
              edit_mode = 1;
            }
          }
        } else {
          input_list.forEach((e) => {
            e.readOnly = true;
          });
          save_button.classList.add("hidden");
          edit_button.textContent = "bearbeiten";
          edit_mode = 0;
          load();
        }
      }

      load_values();
      export async function load_values() {
        try {
          value_list = (await (await fetch("/t/GETMapData")).json()).values;
          load();
        } catch (err) {}
      }

      function load() {
        for (let i = 0; i < input_list.length; i++) {
          if (value_list[i] != undefined) {
            input_list[i].value = value_list[i];
          }
        }
      }

      //scale
      const full_map = document.getElementById("full-map");
      const height_70p = (window.innerHeight / 100) * 70;

      correct_resize();

      window.addEventListener("resize", () => {
        setTimeout(correct_resize, 150);
      });

      function correct_resize() {
        if (window.innerWidth < height_70p) {
          full_map.classList.add("full-map-scale-width");
          full_map.classList.remove("full-map-scale-hight");
        } else {
          full_map.classList.add("full-map-scale-hight");
          full_map.classList.remove("full-map-scale-width");
        }
      }

      //copyright
      const copyright = document.getElementById("copyright");
      let date_now = new Date();
      copyright.textContent = `©${date_now.getUTCFullYear()}\u00A0`;
    </script>
  </head>
  <body>
    <header class="bar">
      <p class="bar-text headline" id="header">GZMaps - Gesamte Karte</p>
    </header>
    <main>
      <div class="hidden" id="edit-bar">
        <p class="button" id="back-to-full-map">Zurück</p>
        <p class="button" id="edit-button">Bearbeiten</p>
      </div>
      <div id="full-map">
        <div class="houses" id="house-1">
          <p>1</p>
        </div>
        <div class="houses" id="house-2">
          <p>2</p>
        </div>
        <div class="houses" id="house-3">
          <p>3</p>
        </div>
        <div class="houses" id="house-4">
          <p>4</p>
        </div>
        <div class="houses" id="house-5">
          <p>5</p>
        </div>
        <div class="houses" id="house-6">
          <p>6</p>
        </div>
        <div class="houses" id="house-8">
          <p>8</p>
        </div>
        <div class="houses" id="house-11">
          <p>11</p>
        </div>
        <div class="corridor-1 corridors"></div>
        <div class="corridor-2 corridors"></div>
        <div class="corridor-3 corridors"></div>
      </div>
      <div class="house-1-map houses-map not-displayed" id="house-1-map"></div>
      <div class="house-2-map houses-map not-displayed" id="house-2-map"></div>
      <div class="house-3-map houses-map not-displayed" id="house-3-map"></div>
      <div class="house-4-map houses-map not-displayed" id="house-4-map"></div>
      <div class="house-5-map houses-map not-displayed" id="house-5-map"></div>
      <div class="house-6-map houses-map not-displayed" id="house-6-map"></div>
      <div class="house-8-map houses-map not-displayed" id="house-8-map"></div>
      <div
        class="house-11-map houses-map not-displayed"
        id="house-11-map"
      ></div>
      <div id="save-bar">
        <p class="button hidden" id="save-button">Speichern</p>
      </div>
    </main>
    <footer class="bar">
      <p class="bar-text" id="copyright"></p>
      <p class="bar-text">Rimolo13 and Mocbuilder</p>
    </footer>
  </body>
